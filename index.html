<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbery Family Finance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#eeede9;--text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);--ok:#3a7d1e;--warn:#b06800;--danger:#c0392b;--ok-bg:#eaf3de;--warn-bg:#faeeda;--danger-bg:#fcebeb;--info:#185fa5;--info-bg:#e6f1fb;--info-bd:rgba(24,95,165,0.3);--brian:#1a6fb5;--brian-bg:#e8f2fc;--brian-bd:rgba(26,111,181,0.3);--eliz:#7b3fa0;--eliz-bg:#f3ecfa;--eliz-bd:rgba(123,63,160,0.3);--other-bg:#eaf3de;--other:#3a7d1e;--r:10px;--rs:7px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0ede8;--text2:#a0a09a;--text3:#6a6a65;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);--ok:#8bc34a;--warn:#ffb74d;--danger:#ef5350;--ok-bg:#1a2d0a;--warn-bg:#2d1f00;--danger-bg:#2d0a0a;--info:#64b5f6;--info-bg:#0d2140;--info-bd:rgba(100,181,246,0.3);--brian:#64b5f6;--brian-bg:#0d2140;--brian-bd:rgba(100,181,246,0.3);--eliz:#ce93d8;--eliz-bg:#1e0d28;--eliz-bd:rgba(206,147,216,0.3);--other-bg:#1a2d0a;--other:#8bc34a}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5}
.page{max-width:1100px;margin:0 auto;padding:20px 16px 48px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
h1{font-size:19px;font-weight:600;letter-spacing:-.3px}
h1 .sub{color:var(--text3);font-weight:400;font-size:13px;margin-left:6px}
.hdr-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.hbtn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
.hbtn:hover{background:var(--bg2)}.hbtn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.hbtn:disabled{opacity:.5;cursor:not-allowed}
.status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.status-dot.live{background:var(--ok);animation:pulse 2s infinite}
.status-dot.loading{background:var(--warn);animation:spin 1s linear infinite}
.status-dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.tab{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.tab:hover{background:var(--bg2)}.tab.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:680px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.grp-grid{grid-template-columns:repeat(3,1fr)!important}}
.met{background:var(--bg2);border-radius:var(--rs);padding:12px 14px}
.ml{font-size:11px;color:var(--text2);margin-bottom:4px}.mv{font-size:20px;font-weight:600}.ms{font-size:10px;margin-top:3px}
.ok{color:var(--ok)}.warn{color:var(--warn)}.danger{color:var(--danger)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.ct{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.grp-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:10px}
.grp-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:9px 6px;cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.grp-btn:hover{border-color:var(--border2);background:var(--bg)}.grp-btn.active{border:2px solid var(--info-bd);background:var(--info-bg)}
.grp-name{font-size:10px;color:var(--text2);margin-bottom:3px}.grp-amt{font-size:13px;font-weight:600}.grp-pct{font-size:9px;color:var(--text3);margin-top:2px}
.grp-btn.active .grp-name,.grp-btn.active .grp-pct{color:var(--info)}.grp-btn.active .grp-amt{color:var(--info)}
.drill{background:var(--bg2);border-radius:var(--rs);padding:12px 14px;margin-bottom:10px}
.dr{display:grid;grid-template-columns:1fr 70px 38px;gap:6px;align-items:center;margin-bottom:7px;font-size:12px}
.dr:last-child{margin-bottom:0}.dr-cat{font-weight:500}
.dbar{height:4px;border-radius:2px;background:var(--border);margin-top:3px}.dfill{height:4px;border-radius:2px}
.back-btn{font-size:10px;padding:2px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer}
.inc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.inc-card{border-radius:var(--rs);padding:14px;border:1px solid var(--border)}
.inc-card.brian{background:var(--brian-bg);border-color:var(--brian-bd)}
.inc-card.elizabeth{background:var(--eliz-bg);border-color:var(--eliz-bd)}
.inc-card.other{background:var(--other-bg)}
.inc-who{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.inc-who.brian{color:var(--brian)}.inc-who.elizabeth{color:var(--eliz)}.inc-who.other{color:var(--other)}
.inc-total{font-size:22px;font-weight:600;margin-bottom:8px}
.inc-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)}
.inc-row:last-child{border-bottom:none}.inc-lbl{color:var(--text2)}.inc-val{font-variant-numeric:tabular-nums;font-weight:500}
.inc-tx{margin-top:10px}.inc-tx-hdr{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.inc-tx-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);gap:8px}
.inc-tx-row:last-child{border-bottom:none}.inc-tx-desc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}.inc-tx-amt{white-space:nowrap;font-variant-numeric:tabular-nums}
.inc-note{font-size:11px;color:var(--text3);font-style:italic;padding:8px 0;text-align:center}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;font-size:11px;color:var(--text2)}
.lsq{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px;flex-shrink:0}
.tx-hdr{font-size:10px;color:var(--text3);font-weight:500;padding:0 0 5px;border-bottom:1px solid var(--border);margin-bottom:4px}
.trow{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.trow:last-child{border-bottom:none}.trow-l{flex:1;min-width:0}
.trow-desc{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow-cat{font-size:10px;color:var(--text3);margin-top:1px}.trow-amt{font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:500}
.note{font-size:11px;color:var(--text3);background:var(--bg2);border-radius:var(--rs);padding:7px 12px;margin-bottom:12px}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;color:var(--text2);font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--info);border-radius:50%;animation:spin 0.8s linear infinite}
.footer{font-size:10px;color:var(--text3);text-align:right;margin-top:16px}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Barbery Family Finance <span class="sub" id="monthLabel"></span></h1>
    <div class="hdr-btns">
      <button class="hbtn active" id="btnExpenses" onclick="setView('expenses')">Expenses</button>
      <button class="hbtn" id="btnIncome" onclick="setView('income')">Income</button>
      <button class="hbtn" id="refreshBtn" onclick="fetchAndRender()">&#8635; Refresh</button>
      <div class="status"><div class="status-dot" id="statusDot"></div><span id="statusText">Loading...</span></div>
    </div>
  </header>

  <div class="note" id="dataNote"></div>
  <div id="mainContent">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div>Fetching your Tiller data...</div>
    </div>
  </div>

  <div id="dashboard" style="display:none">
    <div class="tabs" id="monthTabs"></div>
    <div class="g4" id="kpis"></div>
    <div id="expenseView">
      <div class="card" style="margin-bottom:12px">
        <div class="ct"><span id="grpTitle">Spending by category</span><button class="back-btn" id="backBtn" style="display:none" onclick="clearDrill()">&#x2715; show all</button></div>
        <div class="grp-grid" id="grpGrid"></div>
        <div class="drill" id="drillEl" style="display:none"></div>
      </div>
      <div class="g2">
        <div class="card">
          <div class="ct"><span id="trendTitle">6-month trend</span></div>
          <div class="leg" id="trendLeg"></div>
          <div style="position:relative;height:185px"><canvas id="trendC"></canvas></div>
        </div>
        <div class="card">
          <div class="ct">Largest transactions</div>
          <div class="tx-hdr" id="txSubhead">this month</div>
          <div id="topTx"></div>
        </div>
      </div>
    </div>
    <div id="incomeView" style="display:none">
      <div class="inc-grid" id="incGrid"></div>
      <div class="g2">
        <div class="card">
          <div class="ct">6-month income trend</div>
          <div class="leg"><span><span class="lsq" style="background:var(--brian)"></span>Brian</span><span><span class="lsq" style="background:var(--eliz)"></span>Elizabeth</span><span><span class="lsq" style="background:var(--other)"></span>Other</span></div>
          <div style="position:relative;height:185px"><canvas id="incTrendC"></canvas></div>
        </div>
        <div class="card"><div class="ct">Income notes</div><div id="incNotes"></div></div>
      </div>
    </div>
  </div>
  <div class="footer" id="footer"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const TILLER_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNmRLEioA2e60NaW7QDj5dI8LLVNrDVRg05hLoPV1yj_M3HqgoYIHLOL_vhzYd8-hL3vz3puxedKEL/pub?gid=1433396870&single=true&output=csv";

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const GRP_COLORS = {Tithe:'#c07818',Auto:'#2878cc',Home:'#1a8a65',Food:'#d68a00',Health:'#c03030',Family:'#6040b0',Personal:'#c04070',Travel:'#c05828',Financial:'#707070',Digital:'#508820',Work:'#40a080'};
const GROUPS_MAP = {
  Tithe:    ['Tithe','Charitable Giving'],
  Auto:     ['Gasoline','Auto Maintenance','Auto Repair','Auto Insurance','Auto Tax','Auto Carwash'],
  Home:     ['Mortgage','HOA Fees','Home Maintenance','Home Repair','Home Remodel','Home Insurance','Lawncare','Pest Control','Furniture','Home'],
  Food:     ['Groceries','Restaurants'],
  Health:   ['Medical','Dental','Eye','Prescription','Therapy','Stevens Healthcare','Fitness'],
  Family:   ['College Tuition','College Expenses','Kids Activities','Pet Care','Pet Food'],
  Personal: ['Clothing','Beauty','Beauty and Haircare','Shopping','Adult Activities','Entertainment','Gifts','Christmas'],
  Travel:   ['Travel','ATL Lodging','Relocation - Expenses'],
  Financial:['Life Insurance','Interest','Bank Fees'],
  Digital:  ['Subscription','Technology','Phone','Internet'],
  Work:     ['E Work Expenses','E Office Supplies','Work Expense']
};
const EXCL    = ['cc payment','transfer','income taxes','overdraft'];
const INCC    = ['b paycheck','e paycheck','b bonus','b profit sharing','relocation -income','home sale'];
const BRIAN_C = ['B Paycheck','B Bonus','B Profit Sharing'];
const ELIZ_C  = ['E Paycheck'];
const OTHER_C = ['Relocation -Income','Home Sale'];

// ── STATE ────────────────────────────────────────────────────────────────────
let DASH = null;
let activeM = 0, activeDrill = null, activeView = 'expenses';
let trendChart = null, incTrendChart = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
const fmt  = n => '$' + Math.round(n).toLocaleString();
const fmtS = n => n >= 1000 ? '$' + (n/1000).toFixed(1).replace('.0','') + 'k' : fmt(n);
const mlabel = k => { const d = new Date(k + '-01'); return d.toLocaleString('default', {month:'short', year:'2-digit'}); };
const MKEYS  = () => DASH.last12_labels;

// ── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const hdr = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  const di  = hdr.findIndex(h => h.includes('description'));
  const ci  = hdr.findIndex(h => h.includes('category'));
  const ai  = hdr.findIndex(h => h.includes('amount'));
  const dti = hdr.findIndex(h => h.includes('date'));
  if (ai < 0 || ci < 0) return [];
  const rows = [];
  lines.slice(1).forEach(line => {
    // Handle quoted fields with commas inside
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    const rawAmt = (cols[ai]||'').replace(/[$,"\s]/g,'');
    const amt  = parseFloat(rawAmt);
    const cat  = (cols[ci]||'').replace(/^"|"$/g,'').trim();
    const desc = di >= 0 ? (cols[di]||'').replace(/^"|"$/g,'').trim() : '';
    let mo = 'Unknown';
    if (dti >= 0) {
      const raw = (cols[dti]||'').replace(/^"|"$/g,'').trim();
      const d = new Date(raw);
      if (!isNaN(d)) mo = d.toISOString().slice(0,7);
    }
    if (!isNaN(amt) && cat && mo !== 'Unknown') rows.push({amt, cat, desc, mo});
  });
  return rows;
}

// ── DATA PROCESSOR ───────────────────────────────────────────────────────────
function processRows(rows) {
  const months = [...new Set(rows.map(r => r.mo))].sort();
  const last12 = months.slice(-12), last6 = last12.slice(-6);
  const monthly = {}, trend = {}, it = {brian:[], elizabeth:[], other:[], total:[]};
  Object.keys(GROUPS_MAP).forEach(g => trend[g] = []);

  last12.forEach(m => {
    const mR  = rows.filter(r => r.mo === m);
    const sp  = mR.filter(r => !EXCL.includes(r.cat.toLowerCase()) && !INCC.includes(r.cat.toLowerCase()) && r.amt < 0);
    const inc = mR.filter(r => INCC.includes(r.cat.toLowerCase()) && r.amt > 0);
    const groups = {}, detail = {}, group_tx = {};

    Object.entries(GROUPS_MAP).forEach(([g, cats]) => {
      const gR = sp.filter(r => cats.includes(r.cat));
      groups[g] = Math.round(gR.reduce((a,b) => a + Math.abs(b.amt), 0) * 100) / 100;
      detail[g] = {};
      cats.forEach(c => {
        const cv = sp.filter(r => r.cat === c).reduce((a,b) => a + Math.abs(b.amt), 0);
        if (cv > 0) detail[g][c] = Math.round(cv * 100) / 100;
      });
      group_tx[g] = gR.sort((a,b) => a.amt - b.amt).slice(0,8)
        .map(r => ({desc: r.desc.slice(0,42), cat: r.cat, amt: Math.round(Math.abs(r.amt)*100)/100}));
    });

    const top6 = [...sp].sort((a,b) => a.amt - b.amt).slice(0,6)
      .map(r => ({desc: r.desc.slice(0,42), cat: r.cat, amt: Math.round(Math.abs(r.amt)*100)/100}));

    const bR = inc.filter(r => BRIAN_C.includes(r.cat));
    const eR = inc.filter(r => ELIZ_C.includes(r.cat));
    const oR = inc.filter(r => OTHER_C.includes(r.cat));
    const sum = arr => Math.round(arr.reduce((a,b) => a + b.amt, 0) * 100) / 100;

    const incDet = {
      brian:    {total: sum(bR), paycheck: sum(bR.filter(r=>r.cat==='B Paycheck')), bonus: sum(bR.filter(r=>r.cat==='B Bonus')), profit_sharing: sum(bR.filter(r=>r.cat==='B Profit Sharing')), tx: [...bR].sort((a,b)=>b.amt-a.amt).slice(0,6).map(r=>({desc:r.desc.slice(0,42),cat:r.cat,amt:Math.round(r.amt*100)/100}))},
      elizabeth:{total: sum(eR), paycheck: sum(eR), tx: [...eR].sort((a,b)=>b.amt-a.amt).slice(0,6).map(r=>({desc:r.desc.slice(0,42),cat:r.cat,amt:Math.round(r.amt*100)/100}))},
      other:    {total: sum(oR), cats: OTHER_C.reduce((o,c)=>{ const v=sum(oR.filter(r=>r.cat===c)); if(v>0) o[c]=v; return o; },{}), tx: [...oR].sort((a,b)=>b.amt-a.amt).slice(0,6).map(r=>({desc:r.desc.slice(0,42),cat:r.cat,amt:Math.round(r.amt*100)/100}))}
    };

    monthly[m] = {
      spend:  Math.round(sp.reduce((a,b)=>a+Math.abs(b.amt),0)*100)/100,
      income: sum(inc),
      groups, detail, top_tx: top6, group_tx, income_detail: incDet
    };
  });

  const spT = [], incT = [];
  last6.forEach(m => {
    spT.push(monthly[m]?.spend||0); incT.push(monthly[m]?.income||0);
    it.brian.push(monthly[m]?.income_detail?.brian?.total||0);
    it.elizabeth.push(monthly[m]?.income_detail?.elizabeth?.total||0);
    it.other.push(monthly[m]?.income_detail?.other?.total||0);
    it.total.push(monthly[m]?.income||0);
    Object.keys(GROUPS_MAP).forEach(g => trend[g].push(monthly[m]?.groups[g]||0));
  });

  return {monthly, trend, income_trends:it, spend_trend:spT, income_trend:incT, last6_labels:last6, last12_labels:last12, row_count:rows.length};
}

// ── FETCH & RENDER ───────────────────────────────────────────────────────────
async function fetchAndRender() {
  setStatus('loading', 'Fetching live data...');
  document.getElementById('refreshBtn').disabled = true;
  document.getElementById('loader').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';

  try {
    const res = await fetch(TILLER_CSV_URL, {cache: 'no-store'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 10) throw new Error('Too few rows parsed — check sheet is published correctly');

    DASH = processRows(rows);
    activeM = DASH.last12_labels.length - 1;
    activeDrill = null;

    const now = new Date();
    const ts  = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    setStatus('live', 'Live — ' + ts);
    document.getElementById('dataNote').textContent = 'Live Tiller data · ' + rows.length.toLocaleString() + ' transactions · Auto-refreshes on page load';
    document.getElementById('footer').textContent = 'Last synced: ' + ts + ' · Data flows directly from your Tiller Google Sheet';

    document.getElementById('loader').style.display = 'none';
    document.getElementById('dashboard').style.display = '';
    document.getElementById('monthTabs').innerHTML = '';
    buildTabs();
    refresh();
  } catch(err) {
    setStatus('error', 'Fetch failed — check sheet is published');
    document.getElementById('loader').innerHTML = '<div style="text-align:center;padding:40px;color:var(--danger)">'
      + '<div style="font-size:24px;margin-bottom:12px">&#9888;</div>'
      + '<div style="font-weight:600;margin-bottom:8px">Could not load Tiller data</div>'
      + '<div style="font-size:12px;color:var(--text2);margin-bottom:16px">' + err.message + '</div>'
      + '<div style="font-size:12px;color:var(--text2)">Make sure your Google Sheet Transactions tab is published:<br>File &#8594; Share &#8594; Publish to web &#8594; Transactions &#8594; CSV</div>'
      + '<button onclick="fetchAndRender()" style="margin-top:16px;padding:8px 20px;border-radius:20px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:12px">Try again</button>'
      + '</div>';
  } finally {
    document.getElementById('refreshBtn').disabled = false;
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = text;
}

// ── UI BUILDERS ──────────────────────────────────────────────────────────────
function setView(v) {
  activeView = v;
  document.getElementById('expenseView').style.display = v === 'expenses' ? '' : 'none';
  document.getElementById('incomeView').style.display  = v === 'income'   ? '' : 'none';
  document.getElementById('btnExpenses').className = v === 'expenses' ? 'hbtn active' : 'hbtn';
  document.getElementById('btnIncome').className   = v === 'income'   ? 'hbtn active' : 'hbtn';
  if (v === 'income') { buildIncomeView(); buildIncTrend(); }
}

function buildTabs() {
  const el = document.getElementById('monthTabs');
  if (el.children.length > 0) return;
  MKEYS().forEach((k,i) => {
    const b = document.createElement('button');
    b.className = i === activeM ? 'tab on' : 'tab';
    b.textContent = mlabel(k);
    b.onclick = () => { activeM=i; activeDrill=null; refresh(); };
    el.appendChild(b);
  });
}
function refreshTabs() { document.querySelectorAll('.tab').forEach((b,i) => b.className = i===activeM?'tab on':'tab'); }

function buildKPIs() {
  const d   = DASH.monthly[MKEYS()[activeM]];
  const avg = DASH.spend_trend.reduce((a,b)=>a+b,0) / DASH.spend_trend.length;
  const net = d.income - d.spend;
  const id  = d.income_detail||{};
  const bri = (id.brian||{}).total||0;
  const eli = (id.elizabeth||{}).total||0;
  const rows = [
    {l:'Total spending',    v:fmt(d.spend),  s:d.spend>avg ? fmt(d.spend-avg)+' above avg' : fmt(avg-d.spend)+' below avg', c:d.spend>avg*1.3?'danger':d.spend>avg?'warn':'ok'},
    {l:'Total income',      v:d.income>0?fmt(d.income):'—', s:d.income>0?'recorded this month':'not yet recorded', c:d.income>0?'ok':'warn'},
    {l:'Net cash flow',     v:d.income>0?fmt(net):'—', s:d.income>0?(net>=0?'positive cash flow':'negative cash flow'):'awaiting income', c:d.income>0?(net>=0?'ok':'danger'):''},
    {l:'Brian / Elizabeth', v:d.income>0?fmtS(bri)+' / '+(eli>0?fmtS(eli):'—'):'—', s:bri>0||eli>0?'income split this month':'', c:''}
  ];
  document.getElementById('kpis').innerHTML = rows.map(r =>
    '<div class="met"><div class="ml">'+r.l+'</div><div class="mv">'+r.v+'</div><div class="ms '+r.c+'">'+r.s+'</div></div>'
  ).join('');
}

function buildGroups() {
  const d = DASH.monthly[MKEYS()[activeM]];
  const total = Object.values(d.groups).reduce((a,b)=>a+(b||0),0);
  document.getElementById('grpGrid').innerHTML = Object.entries(d.groups).map(([g,v]) => {
    const pct = total>0 ? Math.round((v||0)/total*100) : 0;
    const col = GRP_COLORS[g]||'#888';
    const act = activeDrill===g;
    return '<div class="grp-btn'+(act?' active':'')+'" onclick="toggleDrill(\''+g+'\')"><div class="grp-name">'+g+'</div><div class="grp-amt" style="color:'+(act?'var(--info)':col)+'">'+fmtS(v||0)+'</div><div class="grp-pct">'+pct+'%</div></div>';
  }).join('');
}

function buildDrill() {
  const el=document.getElementById('drillEl'), bb=document.getElementById('backBtn');
  const gt=document.getElementById('grpTitle'), tt=document.getElementById('trendTitle');
  if (!activeDrill) { el.style.display='none'; bb.style.display='none'; gt.textContent='Spending by category'; tt.textContent='6-month trend'; return; }
  el.style.display='block'; bb.style.display='inline-block';
  gt.textContent=activeDrill+' breakdown'; tt.textContent=activeDrill+' — 6-month trend';
  const detail=DASH.monthly[MKEYS()[activeM]].detail[activeDrill]||{};
  const entries=Object.entries(detail).sort((a,b)=>b[1]-a[1]);
  const max=entries[0]?entries[0][1]:1;
  const grpTotal=DASH.monthly[MKEYS()[activeM]].groups[activeDrill]||1;
  const col=GRP_COLORS[activeDrill]||'#2878cc';
  el.innerHTML = entries.length===0
    ? '<div style="font-size:12px;color:var(--text3)">No spending this month</div>'
    : entries.map(([cat,v]) =>
        '<div class="dr"><div><div class="dr-cat">'+cat+'</div><div class="dbar"><div class="dfill" style="width:'+Math.round(v/max*100)+'%;background:'+col+'"></div></div></div>'
        +'<div style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums">'+fmt(v)+'</div>'
        +'<div style="text-align:right;font-size:10px;color:var(--text3)">'+Math.round(v/grpTotal*100)+'%</div></div>'
      ).join('');
}

function buildTrend() {
  const labels = DASH.last6_labels.map(k=>mlabel(k));
  let ds, leg;
  if (activeDrill) {
    const col = GRP_COLORS[activeDrill]||'#2878cc';
    ds  = [{label:activeDrill,data:DASH.trend[activeDrill],borderColor:col,backgroundColor:col+'22',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:col,borderWidth:2.5}];
    leg = '<span><span class="lsq" style="background:'+col+'"></span>'+activeDrill+'</span>';
  } else {
    ds  = [
      {label:'Spending',data:DASH.spend_trend, borderColor:'#2878cc',backgroundColor:'rgba(40,120,204,0.08)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#2878cc',borderWidth:2},
      {label:'Income',  data:DASH.income_trend,borderColor:'#3a7d1e',tension:0.3,pointRadius:3,pointBackgroundColor:'#3a7d1e',borderWidth:2,fill:false}
    ];
    leg = '<span><span class="lsq" style="background:#2878cc"></span>Spending</span><span><span class="lsq" style="background:#3a7d1e"></span>Income</span>';
  }
  document.getElementById('trendLeg').innerHTML = leg;
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendC'),{
    type:'line', data:{labels,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.raw)}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k',font:{size:10}},grid:{color:'rgba(128,128,128,0.08)'}}}}
  });
}

function buildTx() {
  const d=DASH.monthly[MKEYS()[activeM]], sh=document.getElementById('txSubhead');
  let txList;
  if (activeDrill) {
    txList=(d.group_tx||{})[activeDrill]||[];
    sh.innerHTML='this month &middot; <span style="color:'+GRP_COLORS[activeDrill]+';font-weight:600">'+activeDrill+'</span>';
  } else {
    txList=d.top_tx||[];
    sh.textContent='this month — all categories';
  }
  document.getElementById('topTx').innerHTML = txList.slice(0,8).map(t=>{
    const grp=Object.keys(GROUPS_MAP).find(g=>GROUPS_MAP[g].includes(t.cat))||'';
    const col=GRP_COLORS[grp]||'#888';
    return '<div class="trow"><div class="trow-l"><div class="trow-desc">'+t.desc+'</div><div class="trow-cat" style="color:'+col+'">'+t.cat+'</div></div><div class="trow-amt">'+fmt(t.amt)+'</div></div>';
  }).join('');
}

function txRows(arr) {
  if (!arr||arr.length===0) return '<div class="inc-note">No transactions this month</div>';
  return arr.map(t=>'<div class="inc-tx-row"><div class="inc-tx-desc">'+t.desc+'</div><div class="inc-tx-amt">'+fmt(t.amt)+'</div></div>').join('');
}

function buildIncomeView() {
  const d=DASH.monthly[MKEYS()[activeM]], id=d.income_detail||{};
  const b=id.brian||{total:0,paycheck:0,bonus:0,profit_sharing:0,tx:[]};
  const e=id.elizabeth||{total:0,paycheck:0,tx:[]};
  const o=id.other||{total:0,cats:{},tx:[]};
  let html='';
  html+='<div class="inc-card brian"><div class="inc-who brian">Brian</div><div class="inc-total">'+(b.total>0?fmt(b.total):'—')+'</div>';
  if(b.paycheck>0)       html+='<div class="inc-row"><span class="inc-lbl">Base paycheck</span><span class="inc-val">'+fmt(b.paycheck)+'</span></div>';
  if(b.bonus>0)          html+='<div class="inc-row"><span class="inc-lbl">Bonus</span><span class="inc-val">'+fmt(b.bonus)+'</span></div>';
  if(b.profit_sharing>0) html+='<div class="inc-row"><span class="inc-lbl">Profit sharing</span><span class="inc-val">'+fmt(b.profit_sharing)+'</span></div>';
  if(b.total===0)        html+='<div class="inc-note">No income recorded</div>';
  html+='<div class="inc-tx"><div class="inc-tx-hdr">Transactions</div>'+txRows(b.tx)+'</div></div>';
  html+='<div class="inc-card elizabeth"><div class="inc-who elizabeth">Elizabeth</div><div class="inc-total">'+(e.total>0?fmt(e.total):'—')+'</div>';
  if(e.paycheck>0) html+='<div class="inc-row"><span class="inc-lbl">Main Street Travel</span><span class="inc-val">'+fmt(e.paycheck)+'</span></div>';
  if(e.total===0)  html+='<div class="inc-note">No income recorded</div>';
  html+='<div class="inc-tx"><div class="inc-tx-hdr">Transactions</div>'+txRows(e.tx)+'</div></div>';
  html+='<div class="inc-card other"><div class="inc-who other">Other / One-time</div><div class="inc-total">'+(o.total>0?fmt(o.total):'—')+'</div>';
  Object.entries(o.cats||{}).forEach(([cat,v])=>{ html+='<div class="inc-row"><span class="inc-lbl">'+cat+'</span><span class="inc-val">'+fmt(v)+'</span></div>'; });
  if(o.total===0) html+='<div class="inc-note">None this month</div>';
  html+='<div class="inc-tx"><div class="inc-tx-hdr">Transactions</div>'+txRows(o.tx)+'</div></div>';
  document.getElementById('incGrid').innerHTML=html;
  const mo=MKEYS()[activeM], notes=[];
  if(b.total>0&&e.total===0) notes.push({c:'',t:'Elizabeth income not recorded this month — may be pending Tiller sync.'});
  if(notes.length===0) notes.push({c:'ok',t:'Income recorded across both sources this month.'});
  document.getElementById('incNotes').innerHTML=notes.map(n=>{
    const bg=n.c==='danger'?'var(--danger-bg)':n.c==='warn'?'var(--warn-bg)':'var(--ok-bg)';
    const col=n.c==='danger'?'var(--danger)':n.c==='warn'?'var(--warn)':'var(--ok)';
    const ico=n.c==='danger'?'&#9888;':n.c==='warn'?'&#8505;':'&#10003;';
    return '<div style="display:flex;gap:8px;padding:8px 10px;border-radius:var(--rs);margin-bottom:8px;background:'+bg+';font-size:12px"><span style="color:'+col+'">'+ico+'</span><span style="color:'+col+'">'+n.t+'</span></div>';
  }).join('');
}

function buildIncTrend() {
  const labels=DASH.last6_labels.map(k=>mlabel(k)), it=DASH.income_trends||{};
  if(incTrendChart) incTrendChart.destroy();
  incTrendChart=new Chart(document.getElementById('incTrendC'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Brian',     data:it.brian||[],     backgroundColor:'rgba(26,111,181,0.75)',borderRadius:3,stack:'s'},
      {label:'Elizabeth', data:it.elizabeth||[], backgroundColor:'rgba(123,63,160,0.75)',borderRadius:3,stack:'s'},
      {label:'Other',     data:it.other||[],     backgroundColor:'rgba(58,125,30,0.75)', borderRadius:3,stack:'s'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top',labels:{font:{size:10},boxWidth:10,padding:10}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.raw)}}},
      scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:10}}},y:{stacked:true,ticks:{callback:v=>'$'+Math.round(v/1000)+'k',font:{size:10}},grid:{color:'rgba(128,128,128,0.08)'}}}}
  });
}

function toggleDrill(g) { activeDrill=activeDrill===g?null:g; buildGroups(); buildDrill(); buildTrend(); buildTx(); }
function clearDrill()   { activeDrill=null; buildGroups(); buildDrill(); buildTrend(); buildTx(); }
function refresh() {
  refreshTabs(); buildKPIs();
  if (activeView==='expenses') { buildGroups(); buildDrill(); buildTrend(); buildTx(); }
  else { buildIncomeView(); buildIncTrend(); }
  document.getElementById('monthLabel').textContent = '· ' + mlabel(MKEYS()[activeM]);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
fetchAndRender();
</script>
</body>
</html>
